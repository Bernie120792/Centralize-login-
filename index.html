<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Central Client Panel</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
font-family:Arial;
background:#0f172a;
color:white;
}

/* LOGIN SCREEN */
#loginScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
z-index:10;
}

.container{
background:#1e293b;
padding:25px;
border-radius:12px;
width:85%;
max-width:360px;
text-align:center;
}

input{
width:75%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
font-size:15px;
}

button{
width:80%;
padding:10px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
font-size:15px;
cursor:pointer;
}

.error{
color:#f87171;
margin-top:8px;
font-size:14px;
}

/* CLIENT ID */
#clientName{
position:fixed;
top:5px;
left:50%;
transform:translateX(-50%);
font-size:14px;
background:rgba(0,0,0,0.5);
padding:4px 10px;
border-radius:8px;
z-index:20;
}

/* LOGOUT BUTTON */
#logoutBtn{
position:fixed;
top:5px;
right:8px;
background:#ef4444;
border:none;
padding:5px 10px;
border-radius:6px;
color:white;
font-size:13px;
z-index:20;
display:none;
}

/* IFRAME */
#mainFrame{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
display:none;
}
</style>
</head>

<body>

<div id="loginScreen">
<div class="container">
<h3>Central Login</h3>

<input id="username" placeholder="Username">

<input id="mpin" type="password" placeholder="MPIN">

<button id="loginBtn">Login</button>

<div id="error" class="error"></div>
</div>
</div>

<div id="clientName"></div>

<button id="logoutBtn">Logout</button>

<iframe id="mainFrame"></iframe>

<script>

let clients=[];

/* LOAD CLIENTS */
function loadClients(){

var script=document.createElement("script");

script.src="https://script.google.com/macros/s/AKfycbwvFSK_-3K0ZcomEP1Hf8Cf92fbjU2hM3Af7EJBH90L1QoJ8ceYW9t8vksMmnahzKKj/exec?callback=clientsLoaded";

document.body.appendChild(script);

}

/* CALLBACK */
function clientsLoaded(data){

clients=data.map(function(c){

return{
username:String(c.username).trim(),
mpin:String(c.mpin).trim(),
url:String(c.url).trim()
}

})

}

/* LOGIN */

document.getElementById("loginBtn").addEventListener("click",function(){

var user=document.getElementById("username").value.trim();

var pin=document.getElementById("mpin").value.trim();

var errorDiv=document.getElementById("error");

var client=clients.find(function(c){

return c.username===user && c.mpin===pin

})

if(client){

localStorage.setItem("central_session","active");

localStorage.setItem("client_url",client.url);

localStorage.setItem("client_id",client.username);

openClient(client.url,client.username);

errorDiv.innerText="";

}else{

errorDiv.innerText="Invalid Username or MPIN";

}

})

/* OPEN CLIENT */

function openClient(url,id){

document.getElementById("loginScreen").style.display="none";

var frame=document.getElementById("mainFrame");

frame.style.display="block";

frame.src=url;

document.getElementById("clientName").innerText="Client: "+id;

document.getElementById("logoutBtn").style.display="block";

}

/* LOGOUT */

document.getElementById("logoutBtn").addEventListener("click",function(){

localStorage.clear();

document.getElementById("mainFrame").src="";

document.getElementById("mainFrame").style.display="none";

document.getElementById("loginScreen").style.display="flex";

document.getElementById("clientName").innerText="";

document.getElementById("logoutBtn").style.display="none";

})

/* RESTORE SESSION */

window.onload=function(){

loadClients();

var session=localStorage.getItem("central_session");

var url=localStorage.getItem("client_url");

var id=localStorage.getItem("client_id");

if(session==="active" && url){

openClient(url,id);

}

}

</script>

</body>
</html>
